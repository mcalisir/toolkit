services:
  overleaf:
    build: .
    image: overleaf-custom:latest
    restart: unless-stopped
    ports:
      - "8080:80"
    environment:
      OVERLEAF_APP_NAME: Overleaf
      OVERLEAF_MONGO_URL: mongodb://mongo/sharelatex?replicaSet=rs0
      OVERLEAF_REDIS_HOST: redis
      OVERLEAF_INVITE_TOKEN_SECRET: "mcalisir-overleaf-invite-token-secret-2026-random-uzun"
    volumes:
      - overleaf_data:/var/lib/overleaf
    depends_on:
      - mongo
      - redis
      - mongo-init

  mongo:
    image: mongo:8
    restart: unless-stopped
    command: ["mongod", "--replSet", "rs0", "--bind_ip_all"]
    volumes:
      - mongo_data:/data/db

  mongo-init:
    image: mongo:8
    depends_on:
      - mongo
    restart: "no"
    command: >
      mongosh --host mongo:27017 --eval
      'rs.initiate({_id:"rs0",members:[{_id:0,host:"mongo:27017"}]})'

  redis:
    image: redis:7
    restart: unless-stopped
    volumes:
      - redis_data:/data

volumes:
  overleaf_data:
  mongo_data:
  redis_data:
